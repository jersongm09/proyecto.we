<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Registro</title>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <!-- Librería de íconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- Framework Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Nuestra Hoja de Estilos CSS -->
     <link rel="stylesheet" href="css/styleactividad.css">
</head>
<body>
    <!-- Clases usadas en el contenedor principal:
         container: ancho limitado y centrado horizontal.
         justify-content-center: centra contenido horizontalmente.
         align-items-center: centra contenido verticalmente.
         vh-100: altura del viewport completa para centrado absoluto. -->
         
        <div class="container justify-content-center align-items-center>
         <div class="form-container p-4 shadow rounded">
        <!-- Título del formulario:
                 text-center: texto centrado.
                 mb-3: margen inferior mediano.
                 titulo: clase personalizada para estilizar el título. -->
        <h4 class="text-center mb-3 titulo">Regístrate aquí para más información</h4>
        <!-- Subtítulo:
                 text-center: texto centrado.
                 subtitulo: clase personalizada para estilizar subtítulos. -->
        <p class="text-center subtitulo">Te contactaremos a la brevedad.</p>
        
        <!-- Formulario de registro -->
        <form>
            <!-- Selectores desplegables:
                     form-select: selector desplegable 
                     mb-3: margen inferior mediano. -->
            <select class="form-select mb-3">
                <option>¿Qué producto te interesa?</option>
            </select>
            
            <select class="form-select mb-3">
                <option>¿Qué carrera te gustaría estudiar?</option>
            </select>
            
            <select class="form-select mb-3">
                <option>Elige el campus</option>
            </select>
            <!-- Campos de texto:
                     form-control: estilo estándar para campos de entrada.
                     mb-3: margen inferior mediano. -->
            <input type="text" class="form-control mb-3" placeholder="Apellidos y Nombres">
            <input type="email" class="form-control mb-3" placeholder="Correo electrónico">
            <input type="tel" class="form-control mb-3" placeholder="Celular">

            <!-- Texto informativo:
                     mt-3: margen superior mediano. -->
            <p class="mt-3">¿Cómo nos comunicamos contigo?</p>

            <!-- Opciones de radio en línea:
                     form-check: estilo para opciones de radio o checkbox.
                     form-check-inline: alinea opciones horizontalmente. -->
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="contacto" id="whatsapp">
                <label class="form-check-label" for="whatsapp">WhatsApp</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="contacto" id="llamada">
                <label class="form-check-label" for="llamada">Llamada</label>
            </div>

            <!-- Checkbox términos:
                     form-check: estilo para checkbox.
                     mt-2: margen superior pequeño.
                     input type="checkbox": permite marcar o desmarcar la casilla. -->
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="politicas">
                <label class="form-check-label" for="politicas">
                    Acepto las <a href="#">políticas de privacidad</a> y los <a href="#">términos y condiciones</a>.
                </label>
            </div>

            <!-- Botón enviar:
                     btn: estilo base de botón.
                     btn-enviar: clase personalizada para estilizar.
                     w-100: ancho completo.
                     mt-3: margen superior mediano.
                     type="submit": indica que es un botón para enviar el formulario. -->
            <button type="submit" class="btn btn-enviar w-100 mt-3">Enviar</button>
        </form>
    </div>
</div>
    
</body>
</html>
