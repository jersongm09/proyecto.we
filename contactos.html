<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <!-- Librería de íconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- Framework Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Nuestra Hoja de Estilos CSS -->
     <link rel="stylesheet" href="css/styles-contactos.css">
</head>
<body>
    <article class="container">
        <form>
        <section class="row">
            <section class="col-xs-12 col-sm-6 col-md-6">
                <img src="img/contacto.jpg" alt="contacto" class="img-fluid">
            </section>

            <section class="col-xs-12 col-sm-6 col-md-6">
                <label>Usuario</label>
                <input type="text" placeholder="Ingrese su nombre" required>

                <label>Correo</label>
                <input type="email" placeholder="Ingresu su correo" required>

                <label>Celular</label>
                <input type="tel" placeholder="Ingrese su celular" required>

                <textarea placeholder="Ingrese su comentario"></textarea>

                <input type="submit" value="Enviar datos">

            </section>
        </section>
        </form>
    </article>
</body>
</html>
